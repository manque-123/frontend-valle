<ion-header>
  <ion-toolbar color="danger">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Nuevo Reporte</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-label position="floating">Tipo de Emergencia</ion-label>
    <ion-select [(ngModel)]="nueva.tipo">
      <ion-select-option value="Incendio">Incendio</ion-select-option>
      <ion-select-option value="Accidente">Accidente</ion-select-option>
      <ion-select-option value="Robo">Robo</ion-select-option>
      <ion-select-option value="Otro">Otro</ion-select-option>
    </ion-select>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Descripción</ion-label>
    <ion-textarea [(ngModel)]="nueva.descripcion"></ion-textarea>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Ubicación (Dirección o Referencia)</ion-label>
    <ion-input [(ngModel)]="nueva.ubicacion"></ion-input>
  </ion-item>

  <ion-button expand="block" class="ion-margin-top" (click)="agregar()">
    ENVIAR REPORTE
  </ion-button>
</ion-content>
