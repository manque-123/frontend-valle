<ion-header>
  <ion-toolbar color="success">
    <ion-title>Iniciar Sesión</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div style="text-align: center; margin-bottom: 20px;">
    <h2>Sistema Valle del Sol</h2>
    <p>Ingresa tus credenciales</p>
  </div>

  <ion-item>
    <ion-label position="floating">Usuario</ion-label>
    <ion-input [(ngModel)]="usuario" type="text" placeholder="Ej: genesis"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Contraseña</ion-label>
    <ion-input [(ngModel)]="contrasena" type="password"></ion-input>
  </ion-item>

  <ion-button expand="block" color="primary" class="ion-margin-top" (click)="onLogin()">
    INGRESAR
  </ion-button>

 <div style="text-align: center; margin-top: 30px;">
  <p style="color: #666; font-size: 1.1em; margin-bottom: 20px;">
    ¿ERES NUEVO Y NO TIENES CUENTA?
  </p>

  <ion-button expand="block" fill="outline" color="dark" (click)="irARegistro()">
    REGISTRATE AQUI
  </ion-button>
</div>

</ion-content>
