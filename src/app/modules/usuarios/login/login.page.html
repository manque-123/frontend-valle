<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Acceso Valle del Sol</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div style="text-align: center; margin-bottom: 20px;">
    <h2>Iniciar Sesión</h2>
  </div>

  <ion-item>
    <ion-label position="floating">Nombre de Usuario</ion-label>
    <ion-input type="text" [(ngModel)]="usuario" name="usuario"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Contraseña</ion-label>
    <ion-input type="password" [(ngModel)]="contrasena" name="contrasena"></ion-input>
  </ion-item>

  <div class="ion-margin-top">
    <ion-button expand="block" (click)="onLogin()">
      INGRESAR
    </ion-button>
  </div>
</ion-content>
