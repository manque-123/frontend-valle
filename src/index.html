<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <title>Ionic App</title>

  <base href="/" />

  <meta name="color-scheme" content="light dark" />
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />

  <link rel="icon" type="image/x-icon" href="assets/icon/favicon.ico" />

  <link rel="manifest" href="manifest.webmanifest" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* Forzar a Leaflet a escuchar el arrastre de los dedos en celulares */
    #map {
      touch-action: pan-x pan-y !important;
      z-index: 9999 !important;
      display: block !important;
    }
    /* Destruir el bloqueo de scroll que impone Ionic de forma nativa */
    ion-content {
      --overflow: scroll !important;
      overflow: scroll !important;
      -webkit-overflow-scrolling: touch !important;
    }
    .leaflet-container {
      background-color: #ffffff !important;
    }
  </style>
</head>

<body>
  <app-root></app-root>
  <noscript>Por favor habilite JavaScript para continuar usando esta aplicación.</noscript>
</body>

</html>
